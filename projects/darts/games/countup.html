<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>COUNT UP · DARts</title>
<link rel="stylesheet" href="../common.css">
<script src="../sfx.js"></script>
<script src="../utils.js"></script>
<style>
.cu-rows { display: flex; flex-direction: column; }
.cu-row { display: flex; align-items: center; border-bottom: 1px solid var(--border); padding: 0.7rem 0.9rem; gap: 1rem; }
.cu-row.active-row { background: rgba(255,170,0,0.05); }
.cu-pname { flex: 1; font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.08em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cu-row.active-row .cu-pname { color: var(--led-amber); text-shadow: 0 0 6px rgba(255,170,0,0.3); }
.cu-score { font-size: 1.9rem; color: var(--text-bright); min-width: 90px; text-align: right; }
.cu-row.active-row .cu-score { color: var(--led-amber); text-shadow: 0 0 10px rgba(255,170,0,0.3); }
.cu-hist { font-size: 0.58rem; color: var(--text-dim); min-width: 60px; text-align: right; line-height: 1.5; }
.cu-turn-total { text-align: center; padding: 0.1rem 0; font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.1em; }
.cu-turn-total span { color: var(--led-green); font-size: 1rem; text-shadow: 0 0 8px var(--led-green-glow); }
</style>
</head>
<body>

<div id="setup-screen" class="setup-wrap">
  <div class="setup-top">
    <a class="back-btn" href="../index.html">◂ HUB</a>
    <div class="setup-title">COUNT UP</div>
  </div>

  <div class="s-section">
    <span class="s-label">[ PLAYERS ]</span>
    <div class="chip-row" id="player-chips">
      <div class="chip on" data-n="1">1</div>
      <div class="chip" data-n="2">2</div>
      <div class="chip" data-n="3">3</div>
      <div class="chip" data-n="4">4</div>
      <div class="chip" data-n="5">5</div>
      <div class="chip" data-n="6">6</div>
      <div class="chip" data-n="7">7</div>
      <div class="chip" data-n="8">8</div>
    </div>
  </div>

  <div class="s-section">
    <span class="s-label">[ NAMES ]</span>
    <div id="player-names"></div>
  </div>

  <div class="s-section">
    <span class="s-label">[ ROUNDS ]</span>
    <div class="chip-row" id="rounds-chips">
      <div class="chip" data-r="4">4</div>
      <div class="chip on" data-r="8">8</div>
      <div class="chip" data-r="10">10</div>
      <div class="chip" data-r="15">15</div>
      <div class="chip" data-r="20">20</div>
    </div>
    <div class="row2-hint" style="margin-top:0.4rem">Just score as much as you can. Highest total after all rounds wins. Great for practice!</div>
  </div>

  <button class="btn-start" id="start-btn">[ START GAME ]</button>
</div>

<div id="game-screen" class="game-wrap" style="display:none">
  <div class="top-bar">
    <div style="display:flex;align-items:center">
      <span class="game-logo">COUNT UP</span>
      <span class="r-badge" id="r-badge">R1</span>
    </div>
    <div class="top-btns">
      <button class="theme-btn" id="theme-btn">☀</button>
      <button class="top-btn danger" id="end-btn">END</button>
    </div>
  </div>

  <div class="game-scroll"><div class="cu-rows" id="board"></div></div>

  <div class="input-panel">
    <div class="turn-row">
      <div>
        <div class="turn-lbl">NOW THROWING</div>
        <div class="turn-name" id="turn-name">---</div>
      </div>
      <div class="throw-slots">
        <div class="tslot" id="ts0"></div>
        <div class="tslot" id="ts1"></div>
        <div class="tslot" id="ts2"></div>
      </div>
    </div>

    <div class="cu-turn-total">TURN TOTAL: <span id="turn-total">0</span></div>

    <div class="mult-row" id="mult-row">
      <button class="mbtn active" data-m="1">SINGLE</button>
      <button class="mbtn" data-m="2">DOUBLE</button>
      <button class="mbtn" data-m="3">TRIPLE</button>
    </div>

    <div class="tgt-grid" id="tgt-grid"></div>

    <div class="act-row">
      <button class="btn-undo" id="undo-btn">UNDO</button>
      <button class="btn-next" id="next-btn">NEXT ››</button>
    </div>
  </div>
</div>

<div id="win-overlay">
  <div class="win-icon">📈</div>
  <div style="text-align:center">
    <div class="win-lbl">WINNER</div>
    <div class="win-name" id="win-name">---</div>
  </div>
  <div class="win-sub" id="win-sub"></div>
  <div class="win-btns">
    <button class="btn-start" id="win-new-btn" style="font-size:1rem;padding:0.8rem">NEW GAME</button>
    <button class="btn-resume" onclick="document.getElementById('win-overlay').classList.remove('show')">VIEW BOARD</button>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';
initTheme();
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('theme-btn').addEventListener('click', () => { toggleTheme(); SFX.hit(); });
});

let G = {}, mult = 1, selN = 1, selR = 8;

document.getElementById('player-chips').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  selN = +c.dataset.n;
  document.querySelectorAll('#player-chips .chip').forEach(x => x.classList.toggle('on', x === c));
  buildNameInputs('player-names', selN, 'PLAYER');
});

document.getElementById('rounds-chips').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  selR = +c.dataset.r;
  document.querySelectorAll('#rounds-chips .chip').forEach(x => x.classList.toggle('on', x === c));
});

buildNameInputs('player-names', selN, 'PLAYER');

document.getElementById('start-btn').addEventListener('click', () => {
  G = {
    players: getNames('player-names', 'P'),
    maxRounds: selR,
    scores: {}, best: {},
    currentPlayer: 0, currentThrows: [], round: 1, undoStack: []
  };
  G.players.forEach(p => { G.scores[p] = 0; G.best[p] = 0; });
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  buildGrid();
  renderAll();
});

function turnTotal() {
  return G.currentThrows.reduce((s, th) => s + (th ? th.val * th.m : 0), 0);
}

function buildGrid() {
  const g = document.getElementById('tgt-grid');
  g.innerHTML = '';
  for (let n = 1; n <= 20; n++) {
    const b = document.createElement('button');
    b.className = 'tbtn x01';
    b.textContent = n;
    b.addEventListener('click', () => doThrow(n));
    g.appendChild(b);
  }
  const bull = document.createElement('button');
  bull.className = 'tbtn x01 bull';
  bull.textContent = 'BULL';
  bull.addEventListener('click', () => doThrow(25));
  g.appendChild(bull);
  const miss = document.createElement('button');
  miss.className = 'tbtn miss-btn';
  miss.textContent = 'MISS';
  miss.addEventListener('click', () => doThrow(0));
  g.appendChild(miss);
}

function renderAll() {
  const cp = G.players[G.currentPlayer];
  const board = document.getElementById('board');
  board.innerHTML = '';
  G.players.forEach(p => {
    const row = document.createElement('div');
    row.className = `cu-row${p === cp ? ' active-row' : ''}`;
    row.innerHTML = `
      <div class="cu-pname">${p}</div>
      <div class="cu-hist">BEST: ${G.best[p]}</div>
      <div class="cu-score">${G.scores[p]}</div>`;
    board.appendChild(row);
  });

  document.getElementById('turn-name').textContent = cp;
  document.getElementById('turn-total').textContent = turnTotal();
  document.getElementById('r-badge').textContent = `R${G.round}/${G.maxRounds}`;
  document.querySelectorAll('#mult-row .mbtn').forEach(b => b.classList.toggle('active', +b.dataset.m === mult));

  for (let i = 0; i < 3; i++) {
    const sl = document.getElementById(`ts${i}`);
    const th = G.currentThrows[i];
    if (th === undefined) { sl.textContent = ''; sl.className = 'tslot'; }
    else if (th === null) { sl.textContent = 'MISS'; sl.className = 'tslot miss'; }
    else {
      sl.textContent = th.m > 1 ? `${th.m}×${th.val === 25 ? 'B' : th.val}` : (th.val === 25 ? 'BULL' : String(th.val));
      sl.className = 'tslot hit';
    }
  }
}

function doThrow(val) {
  if (G.currentThrows.length >= 3) { toast('END TURN FIRST'); return; }
  G.undoStack.push({
    scores: JSON.parse(JSON.stringify(G.scores)),
    best: JSON.parse(JSON.stringify(G.best)),
    currentThrows: JSON.parse(JSON.stringify(G.currentThrows)),
    currentPlayer: G.currentPlayer, round: G.round
  });

  if (val === 0) {
    SFX.miss();
    G.currentThrows.push(null);
  } else {
    G.scores[G.players[G.currentPlayer]] += val * mult;
    if (mult === 3) SFX.triple(); else if (mult === 2) SFX.double(); else SFX.hit();
    G.currentThrows.push({ val, m: mult });
  }
  mult = 1;
  renderAll();
}

document.getElementById('next-btn').addEventListener('click', () => {
  const cp = G.players[G.currentPlayer];
  const total = turnTotal();
  if (total > G.best[cp]) G.best[cp] = total;
  if (total === 180) { SFX.checkout(); toast('ONE HUNDRED AND EIGHTYYY!'); } else SFX.next();

  G.currentThrows = [];
  G.currentPlayer = (G.currentPlayer + 1) % G.players.length;
  if (G.currentPlayer === 0) {
    G.round++;
    if (G.round > G.maxRounds) { endGame(); return; }
  }
  mult = 1;
  renderAll();
});

function endGame() {
  let winner = G.players[0], best = -Infinity;
  G.players.forEach(p => { if (G.scores[p] > best) { best = G.scores[p]; winner = p; } });
  showWin(winner, `${G.scores[winner]} PTS  ·  BEST TURN ${G.best[winner]}`, () => location.reload());
}

document.getElementById('undo-btn').addEventListener('click', () => {
  if (!G.undoStack.length) { toast('NOTHING TO UNDO'); return; }
  const s = G.undoStack.pop();
  G.scores = s.scores; G.best = s.best; G.currentThrows = s.currentThrows; G.currentPlayer = s.currentPlayer; G.round = s.round;
  mult = 1; renderAll(); toast('UNDONE');
});

document.querySelectorAll('#mult-row .mbtn').forEach(b => {
  b.addEventListener('click', () => { mult = +b.dataset.m; document.querySelectorAll('#mult-row .mbtn').forEach(x => x.classList.toggle('active', x === b)); });
});

document.getElementById('end-btn').addEventListener('click', () => { if (confirm('End game and return to hub?')) location.href = '../index.html'; });
</script>
<script data-goatcounter="https://jucofuco.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
