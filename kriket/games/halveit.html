<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HALVE IT · DARts</title>
<link rel="stylesheet" href="../common.css">
<script src="../sfx.js"></script>
<script src="../utils.js"></script>
<style>
.hv-rows { display: flex; flex-direction: column; }
.hv-row { display: flex; align-items: center; border-bottom: 1px solid var(--border); padding: 0.7rem 0.9rem; gap: 1rem; }
.hv-row.active-row { background: rgba(255,170,0,0.05); }
.hv-pname { flex: 1; font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.08em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hv-row.active-row .hv-pname { color: var(--led-amber); text-shadow: 0 0 6px rgba(255,170,0,0.3); }
.hv-score { font-size: 1.8rem; color: var(--text-bright); min-width: 80px; text-align: right; }
.hv-row.active-row .hv-score { color: var(--led-amber); text-shadow: 0 0 10px rgba(255,170,0,0.3); }
.big-target { text-align: center; padding: 0.2rem 0; }
.big-target .lbl { font-size: 0.52rem; letter-spacing: 0.2em; color: var(--text-dim); }
.big-target .val { font-size: 2.2rem; color: var(--led-green); text-shadow: 0 0 16px var(--led-green-glow); line-height: 1.1; }
.hv-seq { display: flex; gap: 0.25rem; justify-content: center; flex-wrap: wrap; padding: 0.2rem 0; }
.hv-seq-item {
  font-size: 0.62rem; padding: 0.2rem 0.45rem;
  border: 1px solid var(--border); border-radius: 0.3rem;
  color: var(--text-dim); letter-spacing: 0.04em;
}
.hv-seq-item.cur { border-color: var(--led-green); color: var(--led-green); text-shadow: 0 0 6px var(--led-green-glow); }
.hv-seq-item.past { opacity: 0.35; }
.hv-btn-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.35rem; }
</style>
</head>
<body>

<div id="setup-screen" class="setup-wrap">
  <div class="setup-top">
    <a class="back-btn" href="../index.html">◂ HUB</a>
    <div class="setup-title">HALVE IT</div>
  </div>

  <div class="s-section">
    <span class="s-label">[ PLAYERS ]</span>
    <div class="chip-row" id="player-chips">
      <div class="chip on" data-n="2">2</div>
      <div class="chip" data-n="3">3</div>
      <div class="chip" data-n="4">4</div>
      <div class="chip" data-n="5">5</div>
      <div class="chip" data-n="6">6</div>
      <div class="chip" data-n="7">7</div>
      <div class="chip" data-n="8">8</div>
    </div>
  </div>

  <div class="s-section">
    <span class="s-label">[ NAMES ]</span>
    <div id="player-names"></div>
  </div>

  <div class="s-section">
    <span class="s-label">[ TARGET SEQUENCE ]</span>
    <div class="pill-row">
      <label class="pill on" id="pill-classic"><input type="radio" name="seq" value="classic" checked> CLASSIC</label>
      <label class="pill" id="pill-random"><input type="radio" name="seq" value="random"> RANDOM</label>
    </div>
    <div class="row2-hint" style="margin-top:0.5rem">
      Classic: 20 · 16 · D7 · 14 · T10 · 17 · BULL<br>
      Hit the target = score it. Miss with all 3 darts = your total is HALVED!
    </div>
  </div>

  <button class="btn-start" id="start-btn">[ START GAME ]</button>
</div>

<div id="game-screen" class="game-wrap" style="display:none">
  <div class="top-bar">
    <div style="display:flex;align-items:center">
      <span class="game-logo">HALVE IT</span>
      <span class="r-badge" id="r-badge">R1</span>
    </div>
    <div class="top-btns">
      <button class="theme-btn" id="theme-btn">☀</button>
      <button class="top-btn danger" id="end-btn">END</button>
    </div>
  </div>

  <div class="game-scroll"><div class="hv-rows" id="board"></div></div>

  <div class="input-panel">
    <div class="turn-row">
      <div>
        <div class="turn-lbl">NOW THROWING</div>
        <div class="turn-name" id="turn-name">---</div>
      </div>
      <div class="throw-slots">
        <div class="tslot" id="ts0"></div>
        <div class="tslot" id="ts1"></div>
        <div class="tslot" id="ts2"></div>
      </div>
    </div>

    <div class="big-target">
      <div class="lbl">TARGET THIS ROUND</div>
      <div class="val" id="cur-target">20</div>
    </div>

    <div class="hv-seq" id="seq-bar"></div>

    <div class="hv-btn-row" id="hit-row">
      <button class="tbtn" id="h1-btn" style="font-size:0.85rem">HIT ×1</button>
      <button class="tbtn" id="h2-btn" style="font-size:0.85rem">HIT ×2</button>
      <button class="tbtn" id="h3-btn" style="font-size:0.85rem">HIT ×3</button>
      <button class="tbtn miss-btn" id="miss-btn">MISS</button>
    </div>

    <div class="act-row">
      <button class="btn-undo" id="undo-btn">UNDO</button>
      <button class="btn-next" id="next-btn">NEXT ››</button>
    </div>
  </div>
</div>

<div id="win-overlay">
  <div class="win-icon">✂️</div>
  <div style="text-align:center">
    <div class="win-lbl">WINNER</div>
    <div class="win-name" id="win-name">---</div>
  </div>
  <div class="win-sub" id="win-sub"></div>
  <div class="win-btns">
    <button class="btn-start" id="win-new-btn" style="font-size:1rem;padding:0.8rem">NEW GAME</button>
    <button class="btn-resume" onclick="document.getElementById('win-overlay').classList.remove('show')">VIEW BOARD</button>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';
initTheme();
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('theme-btn').addEventListener('click', () => { toggleTheme(); SFX.hit(); });
});

// Targets: {lbl, val} — val is points per single hit; mult in lbl shows required ring
const CLASSIC_SEQ = [
  { lbl: '20',   val: 20, name: '20' },
  { lbl: '16',   val: 16, name: '16' },
  { lbl: 'D7',   val: 14, name: 'DOUBLE 7' },
  { lbl: '14',   val: 14, name: '14' },
  { lbl: 'T10',  val: 30, name: 'TRIPLE 10' },
  { lbl: '17',   val: 17, name: '17' },
  { lbl: 'BULL', val: 25, name: 'BULL' },
];

function randomSeq() {
  const seq = [];
  const used = new Set();
  while (seq.length < 6) {
    const n = 1 + Math.floor(Math.random() * 20);
    if (used.has(n)) continue;
    used.add(n);
    const kind = Math.random();
    if (kind < 0.6)      seq.push({ lbl: String(n), val: n,     name: String(n) });
    else if (kind < 0.85) seq.push({ lbl: 'D' + n,   val: n * 2, name: 'DOUBLE ' + n });
    else                  seq.push({ lbl: 'T' + n,   val: n * 3, name: 'TRIPLE ' + n });
  }
  seq.push({ lbl: 'BULL', val: 25, name: 'BULL' });
  return seq;
}

let G = {}, selN = 2;

document.getElementById('player-chips').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  selN = +c.dataset.n;
  document.querySelectorAll('#player-chips .chip').forEach(x => x.classList.toggle('on', x === c));
  buildNameInputs('player-names', selN, 'PLAYER');
});

document.querySelectorAll('.pill input[name="seq"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('pill-classic').classList.toggle('on', r.value === 'classic' && r.checked);
    document.getElementById('pill-random').classList.toggle('on', r.value === 'random' && r.checked);
  });
});

buildNameInputs('player-names', selN, 'PLAYER');

document.getElementById('start-btn').addEventListener('click', () => {
  const useRandom = document.querySelector('.pill input[value="random"]').checked;
  G = {
    players: getNames('player-names', 'P'),
    seq: useRandom ? randomSeq() : CLASSIC_SEQ.map(t => ({...t})),
    scores: {},
    currentPlayer: 0, currentThrows: [], round: 1, undoStack: []
  };
  G.players.forEach(p => G.scores[p] = 0);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  renderAll();
});

function curTarget() { return G.seq[G.round - 1]; }

function renderAll() {
  const cp = G.players[G.currentPlayer];
  const board = document.getElementById('board');
  board.innerHTML = '';
  G.players.forEach(p => {
    const row = document.createElement('div');
    row.className = `hv-row${p === cp ? ' active-row' : ''}`;
    row.innerHTML = `<div class="hv-pname">${p}</div><div class="hv-score">${G.scores[p]}</div>`;
    board.appendChild(row);
  });

  const t = curTarget();
  document.getElementById('turn-name').textContent = cp;
  document.getElementById('cur-target').textContent = t.name;
  document.getElementById('r-badge').textContent = `R${G.round}/${G.seq.length}`;

  // Sequence bar
  const sb = document.getElementById('seq-bar');
  sb.innerHTML = '';
  G.seq.forEach((s, i) => {
    const d = document.createElement('span');
    d.className = `hv-seq-item${i === G.round - 1 ? ' cur' : ''}${i < G.round - 1 ? ' past' : ''}`;
    d.textContent = s.lbl;
    sb.appendChild(d);
  });

  for (let i = 0; i < 3; i++) {
    const sl = document.getElementById(`ts${i}`);
    const th = G.currentThrows[i];
    if (th === undefined) { sl.textContent = ''; sl.className = 'tslot'; }
    else if (th === 0) { sl.textContent = 'MISS'; sl.className = 'tslot miss'; }
    else { sl.textContent = `+${th}`; sl.className = 'tslot hit'; }
  }
}

// hits = how many of the 3 darts hit (records them all at once OR one at a time)
function doThrow(hit) {
  if (G.currentThrows.length >= 3) { toast('END TURN FIRST'); return; }
  G.undoStack.push({ scores: JSON.parse(JSON.stringify(G.scores)), currentThrows: [...G.currentThrows], currentPlayer: G.currentPlayer, round: G.round });

  const cp = G.players[G.currentPlayer];
  const t = curTarget();

  if (hit === 0) {
    SFX.miss();
    G.currentThrows.push(0);
  } else {
    const pts = t.val * hit;
    G.scores[cp] += pts;
    if (hit === 3) SFX.triple(); else if (hit === 2) SFX.double(); else SFX.hit();
    G.currentThrows.push(pts);
  }
  renderAll();
}

document.getElementById('h1-btn').addEventListener('click', () => doThrow(1));
document.getElementById('h2-btn').addEventListener('click', () => doThrow(2));
document.getElementById('h3-btn').addEventListener('click', () => doThrow(3));
document.getElementById('miss-btn').addEventListener('click', () => doThrow(0));

document.getElementById('next-btn').addEventListener('click', () => {
  const cp = G.players[G.currentPlayer];

  // Halving rule: if no dart this turn scored, halve total (round up)
  const anyHit = G.currentThrows.some(th => th > 0);
  if (G.currentThrows.length > 0 && !anyHit) {
    G.scores[cp] = Math.ceil(G.scores[cp] / 2);
    SFX.bust();
    toast(`${cp} HALVED!`);
  } else {
    SFX.next();
  }

  G.currentThrows = [];
  G.currentPlayer = (G.currentPlayer + 1) % G.players.length;
  if (G.currentPlayer === 0) {
    G.round++;
    if (G.round > G.seq.length) { endGame(); return; }
  }
  renderAll();
});

function endGame() {
  let winner = G.players[0], best = -Infinity;
  G.players.forEach(p => { if (G.scores[p] > best) { best = G.scores[p]; winner = p; } });
  showWin(winner, `${G.scores[winner]} PTS`, () => location.reload());
}

document.getElementById('undo-btn').addEventListener('click', () => {
  if (!G.undoStack.length) { toast('NOTHING TO UNDO'); return; }
  const s = G.undoStack.pop();
  G.scores = s.scores; G.currentThrows = s.currentThrows; G.currentPlayer = s.currentPlayer; G.round = s.round;
  renderAll(); toast('UNDONE');
});

document.getElementById('end-btn').addEventListener('click', () => { if (confirm('End game and return to hub?')) location.href = '../index.html'; });
</script>
</body>
</html>
